<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Homework Portal</title>
    <style>
        body { font-family: 'Arial', sans-serif; margin: 0; padding: 0; background-color: #f4f6f9; color: #333; }
        header { background-color: #1e3a8a; color: white; text-align: center; padding: 25px 10px; }
        header h1 { margin: 0; font-size: 26px; font-weight: bold; }
        header p { margin: 8px 0 0; font-size: 15px; opacity: 0.9; }
        
        .container { max-width: 1000px; margin: 20px auto; padding: 0 15px; }
        .sheet-container { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.08); overflow: hidden; }
        
        /* गुगल शीट को मोबाइल में सही दिखाने के लिए रेस्पॉन्सिव स्टाइल */
        iframe { width: 100%; height: 600px; border: none; border-radius: 4px; }
    </style>
</head>
<body>

<header>
    <h1> Swami Dayanand High School 
      <h2>  st.Johns English High School
    </h1> - Digital Homework Portal </h1>
    <p> class 1 to 10 daily Homework </p>
</header>

<div class="container">
    <div class="sheet-container">
        
        <iframe src="https://docs.google.com/spreadsheets/d/1CzUrgl2PDi36N0EdW6mwLwbCzcdTUF1-Nbg70umzMDg/edit?usp=drivesdk"></iframe>
    </div>
</div>

</body>
</html>
